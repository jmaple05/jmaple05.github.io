<!DOCTYPE html>
<html lang="en">

  <head>
    <style>
      
      
      :root {
            --accent-color: #47ebeb;
            --background-color: #2a2a31;
            --text-color: #fff;
            --text-color-muted: #b9b9b9;

            /* spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 32px;
            --space-xl: 64px;
            --space-xxl: 128px;

            /* typography */
            --font-size-xs: 14px;
            --font-size-sm: 16px;
            --font-size-md: 18px;
            --font-size-lg: 24px;
            --font-size-xl: 28px;
            --font-size-xxl: 88px;
        }

      body {
        background-color: var(--background-color);
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        padding: 0 20px;
        color: var(--text-color);
      }
      
    </style>
  </head>

  <body>
    <div id="page">

      </header>

        <div id="about">

            Hi, I'm Jesse.

        </div>
      </main>
    </div>
  </body>
  
</html>
